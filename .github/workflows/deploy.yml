name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  DOTNET_VERSION: |
    9.0.x
    10.0.x

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is-prerelease: ${{ steps.extract.outputs.is-prerelease }}

    steps:
      - name: Extract version from tag
        id: extract
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

          if ! [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi

          if [[ $VERSION =~ - ]]; then
            echo "is-prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is-prerelease=false" >> $GITHUB_OUTPUT
          fi

  build-and-pack:
    name: Build & Pack
    runs-on: ubuntu-latest
    needs: validate-tag
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI workload
        run: dotnet workload install maui
        continue-on-error: true

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack NuGet packages
        run: |
          VERSION=${{ needs.validate-tag.outputs.version }}
          echo "Packing version: $VERSION"

          PROJECTS=(
            "src/TypeGuard.Core/TypeGuard.Core.csproj"
            "src/TypeGuard.Console/TypeGuard.Console.csproj"
            "src/TypeGuard.Avalonia/TypeGuard.Avalonia.csproj"
            "src/TypeGuard.Wpf/TypeGuard.Wpf.csproj"
            "src/TypeGuard.Winforms/TypeGuard.Winforms.csproj"
            "src/TypeGuard.Maui/TypeGuard.Maui.csproj"
            "src/TypeGuard.Blazor/TypeGuard.Blazor.csproj"
          )

          for project in "${PROJECTS[@]}"; do
            echo "Packing $project"
            dotnet pack "$project" \
              --configuration Release \
              --no-build \
              --output ./artifacts \
              /p:PackageVersion=$VERSION
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages-${{ github.sha }}
          path: ./artifacts/*.nupkg
          retention-days: 7

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [validate-tag, build-and-pack]
    permissions:
      contents: write
      packages: write
    environment:
      name: nuget-production
      url: https://www.nuget.org/packages/TypeGuard.Core/${{ needs.validate-tag.outputs.version }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages-${{ github.sha }}
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Verify package signatures
        run: |
          for package in ./artifacts/*.nupkg; do
            echo "Verifying $(basename "$package")"
            dotnet nuget verify "$package" || echo "::warning::Package verification failed for $(basename "$package")"
          done

      - name: Publish to NuGet.org
        if: needs.validate-tag.outputs.is-prerelease == 'false'
        run: |
          echo "Publishing stable packages to NuGet.org"
          for package in ./artifacts/*.nupkg; do
            echo "Publishing $(basename "$package")"
            dotnet nuget push "$package" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Publish pre-release to NuGet.org
        if: needs.validate-tag.outputs.is-prerelease == 'true'
        run: |
          echo "Publishing pre-release packages to NuGet.org"
          for package in ./artifacts/*.nupkg; do
            echo "Publishing $(basename "$package")"
            dotnet nuget push "$package" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Publish to GitHub Packages
        run: |
          echo "Publishing packages to GitHub Packages"
          for package in ./artifacts/*.nupkg; do
            echo "Publishing $(basename "$package")"
            dotnet nuget push "$package" \
              --api-key ${{ secrets.GITHUB_TOKEN }} \
              --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
              --skip-duplicate || echo "::warning::Failed to publish $(basename "$package") to GitHub Packages"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.nupkg
          draft: false
          prerelease: ${{ needs.validate-tag.outputs.is-prerelease == 'true' }}
          fail_on_unmatched_files: true
