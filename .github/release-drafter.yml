name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

version-resolver:
  major:
    labels:
      - 'breaking'
  minor:
    labels:
      - 'feature'
  patch:
    labels:
      - 'fix'
      - 'chore'
      - 'docs'
      - 'style'
      - 'perf'
  default: patch

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

autolabeler:
  - label: 'breaking'
    title:
      - '/^feat!(\(.+\))?:/i'
      - '/BREAKING CHANGE/i'
    body:
      - '/BREAKING CHANGE/i'
  - label: 'feature'
    title:
      - '/^feat(\(.+\))?:/i'
  - label: 'fix'
    title:
      - '/^fix(\(.+\))?:/i'
  - label: 'docs'
    title:
      - '/^docs(\(.+\))?:/i'
  - label: 'style'
    title:
      - '/^style(\(.+\))?:/i'
  - label: 'perf'
    title:
      - '/^perf(\(.+\))?:/i'
  - label: 'chore'
    title:
      - '/^chore(\(.+\))?:/i'
      - '/^refactor(\(.+\))?:/i'
      - '/^build(\(.+\))?:/i'
      - '/^ci(\(.+\))?:/i'

categories:
  - title: '💥 Breaking Changes'
    labels:
      - 'breaking'
  - title: '🚀 Features'
    labels:
      - 'feature'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
  - title: '📚 Documentation'
    labels:
      - 'docs'
  - title: '🎨 Styling & Theming'
    labels:
      - 'style'
  - title: '🚅 Performance'
    labels:
      - 'perf'
  - title: '🧹 Maintenance'
    labels:
      - 'chore'

exclude-labels:
  - 'ignore-for-release'
  - 'dependencies'

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/DoubledDoge/TypeGuard/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
